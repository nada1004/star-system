name: Firebase → data.json 자동 동기화

on:
  schedule:
    - cron: '*/30 * * * *'   # 30분마다 실행
  workflow_dispatch:           # 수동 실행 버튼

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Firebase에서 데이터 받기
        id: fetch
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/firebase_raw.json -w "%{http_code}" \
            "https://stardata1004-default-rtdb.firebaseio.com/.json")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Firebase fetch 실패 (HTTP $HTTP_STATUS)"
            exit 1
          fi
          echo "Firebase fetch 성공"

      - name: admin_pw 제거 후 data.json 갱신
        run: |
          python3 - <<'EOF'
          import json, sys

          with open('/tmp/firebase_raw.json', encoding='utf-8') as f:
              data = json.load(f)

          # 민감 필드 제거
          data.pop('admin_pw', None)

          with open('data.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False)

          print(f"data.json 작성 완료 (savedAt: {data.get('savedAt', 'N/A')})")
          EOF

      - name: 변경 여부 확인
        id: check
        run: |
          if git diff --quiet data.json; then
            echo "변경 없음 — 커밋 스킵"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: 커밋 & 푸시
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "auto: Firebase → data.json 동기화 [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
